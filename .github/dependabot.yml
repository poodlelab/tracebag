version: 2

# Keep routine updates small and reviewable. Major runtime and framework
# migrations are planned work and must not be introduced automatically.
updates:
  - package-ecosystem: npm
    directory: /src/Tracebag.Web
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      web-compatible:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /website
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      website-compatible:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: npm
    directory: /tests/browser
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      browser-tests-compatible:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      dotnet-compatible:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      actions-compatible:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']

  - package-ecosystem: docker
    directories:
      - /
      - /demo
      - /runners/dotnet-8
      - /runners/dotnet-9
      - /runners/dotnet-10
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      container-images-compatible:
        patterns: ['*']
        update-types: ['minor', 'patch']
    ignore:
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
