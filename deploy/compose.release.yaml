name: tracebag

services:
  tracebag:
    image: ${TRACEBAG_IMAGE:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag:${TRACEBAG_VERSION:-0.1.0}}
    restart: unless-stopped
    depends_on:
      tracebag-postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: http://+:8080
      TRACEBAG_STAGE: ${TRACEBAG_STAGE:-production}
      TRACEBAG_PUBLIC_URL: ${TRACEBAG_PUBLIC_URL:-http://localhost:9090}
      TRACEBAG_DATABASE_URL: Host=tracebag-postgres;Port=5432;Database=tracebag;Username=tracebag;Password=${TRACEBAG_POSTGRES_PASSWORD:?Set TRACEBAG_POSTGRES_PASSWORD in .env}
      TRACEBAG_AUTH_ENABLED: ${TRACEBAG_AUTH_ENABLED:-true}
      TRACEBAG_ADMIN_USER: ${TRACEBAG_ADMIN_USER:-admin}
      TRACEBAG_ADMIN_PASSWORD_HASH: ${TRACEBAG_ADMIN_PASSWORD_HASH:?Set TRACEBAG_ADMIN_PASSWORD_HASH in .env}
      TRACEBAG_AUTH_LOGIN_PERMIT_LIMIT: ${TRACEBAG_AUTH_LOGIN_PERMIT_LIMIT:-5}
      TRACEBAG_AUTH_LOGIN_WINDOW_SECONDS: ${TRACEBAG_AUTH_LOGIN_WINDOW_SECONDS:-60}
      TRACEBAG_TRUSTED_PROXIES: ${TRACEBAG_TRUSTED_PROXIES:-}
      TRACEBAG_AUDIT_RETENTION_DAYS: ${TRACEBAG_AUDIT_RETENTION_DAYS:-30}
      TRACEBAG_AUDIT_MAX_EVENTS: ${TRACEBAG_AUDIT_MAX_EVENTS:-100000}
      TRACEBAG_AUDIT_RETENTION_DELETE_BATCH_SIZE: ${TRACEBAG_AUDIT_RETENTION_DELETE_BATCH_SIZE:-1000}
      TRACEBAG_AUDIT_RETENTION_SCAN_SECONDS: ${TRACEBAG_AUDIT_RETENTION_SCAN_SECONDS:-300}
      TRACEBAG_DIAGNOSTIC_JOB_RETENTION_DAYS: ${TRACEBAG_DIAGNOSTIC_JOB_RETENTION_DAYS:-30}
      TRACEBAG_DIAGNOSTIC_JOB_RETENTION_DELETE_BATCH_SIZE: ${TRACEBAG_DIAGNOSTIC_JOB_RETENTION_DELETE_BATCH_SIZE:-100}
      TRACEBAG_DURABLE_RETENTION_SCAN_SECONDS: ${TRACEBAG_DURABLE_RETENTION_SCAN_SECONDS:-300}
      TRACEBAG_INCIDENT_MAX_COUNT: ${TRACEBAG_INCIDENT_MAX_COUNT:-200}
      TRACEBAG_ALLOWED_LABEL: ${TRACEBAG_ALLOWED_LABEL:-tracebag.enabled=true}
      TRACEBAG_ENVIRONMENT_LABEL: ${TRACEBAG_ENVIRONMENT_LABEL:-}
      TRACEBAG_DATA_DIR: /data
      TRACEBAG_ARTIFACT_DIR: /artifacts
      TRACEBAG_ARTIFACT_VOLUME: ${TRACEBAG_ARTIFACT_VOLUME:-tracebag_artifacts}
      TRACEBAG_RUNNER_IMAGE_DOTNET_8: ${TRACEBAG_RUNNER_IMAGE_DOTNET_8:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag-runner-dotnet-8:${TRACEBAG_VERSION:-0.1.0}}
      TRACEBAG_RUNNER_IMAGE_DOTNET_9: ${TRACEBAG_RUNNER_IMAGE_DOTNET_9:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag-runner-dotnet-9:${TRACEBAG_VERSION:-0.1.0}}
      TRACEBAG_RUNNER_IMAGE_DOTNET_10: ${TRACEBAG_RUNNER_IMAGE_DOTNET_10:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag-runner-dotnet-10:${TRACEBAG_VERSION:-0.1.0}}
      TRACEBAG_RUNNER_DEFAULT_RUNTIME_MAJOR: ${TRACEBAG_RUNNER_DEFAULT_RUNTIME_MAJOR:-8}
      TRACEBAG_RUNNER_MEMORY_LIMIT_BYTES: ${TRACEBAG_RUNNER_MEMORY_LIMIT_BYTES:-1073741824}
      TRACEBAG_RUNNER_CPU_LIMIT_MILLICORES: ${TRACEBAG_RUNNER_CPU_LIMIT_MILLICORES:-1000}
      TRACEBAG_RUNNER_PIDS_LIMIT: ${TRACEBAG_RUNNER_PIDS_LIMIT:-128}
      TRACEBAG_RESTART_ENABLED: ${TRACEBAG_RESTART_ENABLED:-false}
      TRACEBAG_COUNTER_MAX_SECONDS: ${TRACEBAG_COUNTER_MAX_SECONDS:-600}
      TRACEBAG_DIAGNOSTIC_JOB_MAX_ACTIVE_GLOBAL: ${TRACEBAG_DIAGNOSTIC_JOB_MAX_ACTIVE_GLOBAL:-2}
      TRACEBAG_DIAGNOSTIC_JOB_DAILY_LIMIT: ${TRACEBAG_DIAGNOSTIC_JOB_DAILY_LIMIT:-25}
      TRACEBAG_DIAGNOSTIC_JOB_MAX_DURATION_SECONDS: ${TRACEBAG_DIAGNOSTIC_JOB_MAX_DURATION_SECONDS:-600}
      TRACEBAG_FULL_DUMP_ENABLED: ${TRACEBAG_FULL_DUMP_ENABLED:-false}
      TRACEBAG_ANALYSIS_MAX_TRACE_BYTES: ${TRACEBAG_ANALYSIS_MAX_TRACE_BYTES:-536870912}
      TRACEBAG_ANALYSIS_MAX_STACK_BYTES: ${TRACEBAG_ANALYSIS_MAX_STACK_BYTES:-8388608}
      TRACEBAG_ANALYSIS_MAX_EVENTS: ${TRACEBAG_ANALYSIS_MAX_EVENTS:-2000000}
      TRACEBAG_COUNTER_RECORDING_ENABLED: ${TRACEBAG_COUNTER_RECORDING_ENABLED:-true}
      TRACEBAG_COUNTER_RECORDING_DEFAULT_INTERVAL_SECONDS: ${TRACEBAG_COUNTER_RECORDING_DEFAULT_INTERVAL_SECONDS:-5}
      TRACEBAG_COUNTER_RECORDING_MAX_DURATION_MINUTES: ${TRACEBAG_COUNTER_RECORDING_MAX_DURATION_MINUTES:-1440}
      TRACEBAG_COUNTER_RECORDING_MAX_ACTIVE_GLOBAL: ${TRACEBAG_COUNTER_RECORDING_MAX_ACTIVE_GLOBAL:-3}
      TRACEBAG_COUNTER_RECORDING_RETENTION_DAYS: ${TRACEBAG_COUNTER_RECORDING_RETENTION_DAYS:-7}
      TRACEBAG_LOG_INGESTION_ENABLED: ${TRACEBAG_LOG_INGESTION_ENABLED:-true}
      TRACEBAG_LOG_CHANNEL_CAPACITY: ${TRACEBAG_LOG_CHANNEL_CAPACITY:-5000}
      TRACEBAG_LOG_BATCH_SIZE: ${TRACEBAG_LOG_BATCH_SIZE:-200}
      TRACEBAG_LOG_FLUSH_MILLISECONDS: ${TRACEBAG_LOG_FLUSH_MILLISECONDS:-1000}
      TRACEBAG_LOG_COLLECTOR_SCAN_SECONDS: ${TRACEBAG_LOG_COLLECTOR_SCAN_SECONDS:-5}
      TRACEBAG_LOG_RETENTION_DAYS: ${TRACEBAG_LOG_RETENTION_DAYS:-7}
      TRACEBAG_LOG_MAX_TOTAL_BYTES: ${TRACEBAG_LOG_MAX_TOTAL_BYTES:-1073741824}
      TRACEBAG_LOG_MAX_BYTES_PER_CONTAINER: ${TRACEBAG_LOG_MAX_BYTES_PER_CONTAINER:-268435456}
      TRACEBAG_LOG_RETENTION_DELETE_BATCH_SIZE: ${TRACEBAG_LOG_RETENTION_DELETE_BATCH_SIZE:-1000}
      TRACEBAG_LOG_RETENTION_SCAN_SECONDS: ${TRACEBAG_LOG_RETENTION_SCAN_SECONDS:-60}
      TRACEBAG_LOG_MAX_LINE_BYTES: ${TRACEBAG_LOG_MAX_LINE_BYTES:-262144}
      TRACEBAG_ARTIFACT_RETENTION_HOURS: ${TRACEBAG_ARTIFACT_RETENTION_HOURS:-24}
      TRACEBAG_ARTIFACT_MAX_COUNT: ${TRACEBAG_ARTIFACT_MAX_COUNT:-20}
      TRACEBAG_ARTIFACT_MAX_TOTAL_BYTES: ${TRACEBAG_ARTIFACT_MAX_TOTAL_BYTES:-2147483648}
    ports:
      - "${TRACEBAG_BIND_ADDRESS:-127.0.0.1}:${TRACEBAG_PORT:-9090}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - tracebag-artifacts:/artifacts
      - tracebag-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "-T", "3", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    labels:
      tracebag.internal: "true"
    security_opt:
      - no-new-privileges:true

  tracebag-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tracebag
      POSTGRES_USER: tracebag
      POSTGRES_PASSWORD: ${TRACEBAG_POSTGRES_PASSWORD:?Set TRACEBAG_POSTGRES_PASSWORD in .env}
    volumes:
      - tracebag-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracebag -d tracebag"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    labels:
      tracebag.internal: "true"
    security_opt:
      - no-new-privileges:true

  tracebag-runner-dotnet-8:
    image: ${TRACEBAG_RUNNER_IMAGE_DOTNET_8:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag-runner-dotnet-8:${TRACEBAG_VERSION:-0.1.0}}
    profiles: ["runners"]
    entrypoint: ["/bin/true"]
    labels:
      tracebag.internal: "true"

  tracebag-runner-dotnet-9:
    image: ${TRACEBAG_RUNNER_IMAGE_DOTNET_9:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag-runner-dotnet-9:${TRACEBAG_VERSION:-0.1.0}}
    profiles: ["runners"]
    entrypoint: ["/bin/true"]
    labels:
      tracebag.internal: "true"

  tracebag-runner-dotnet-10:
    image: ${TRACEBAG_RUNNER_IMAGE_DOTNET_10:-${TRACEBAG_REGISTRY:-ghcr.io/poodlelab}/tracebag-runner-dotnet-10:${TRACEBAG_VERSION:-0.1.0}}
    profiles: ["runners"]
    entrypoint: ["/bin/true"]
    labels:
      tracebag.internal: "true"

volumes:
  tracebag-artifacts:
    name: ${TRACEBAG_ARTIFACT_VOLUME:-tracebag_artifacts}
  tracebag-data:
    name: ${TRACEBAG_DATA_VOLUME:-tracebag_data}
  tracebag-postgres:
    name: ${TRACEBAG_POSTGRES_VOLUME:-tracebag_postgres}
